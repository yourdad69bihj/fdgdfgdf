<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lower price</title>
    <link rel="manifest" href="app.json">
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Helvetica', Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .app-container {
            width: 100%;
            max-width: 400px;
            background: #000000;
            border: 2px solid #ffffff;
        }
        .header {
            background: #ffffff;
            color: #000000;
            padding: 20px;
            text-align: center;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        .content { padding: 25px; }
        .label { font-size: 11px; font-weight: bold; text-transform: uppercase; margin-bottom: 8px; display: block; color: #888; }
        input {
            width: 100%;
            padding: 15px;
            background: #111111;
            border: 2px solid #ffffff;
            color: #ffffff;
            margin-bottom: 20px;
            box-sizing: border-box;
            outline: none;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #ffffff;
            color: #000000;
            border: none;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
        }
        #results { margin-top: 30px; display: none; border-top: 2px solid #ffffff; padding-top: 20px; }
        .result-item {
            border: 1px solid #ffffff;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #111111;
        }
        .store-info { font-weight: bold; text-transform: uppercase; font-size: 12px; }
        .price-box {
            background: #ffffff;
            color: #000000;
            padding: 8px 12px;
            font-weight: 900;
            cursor: pointer;
        }
        .location-tag { font-size: 9px; color: #aaaaaa; display: block; margin-top: 4px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">lower price</div>
    <div class="content">
        <span class="label">Product Link / Name</span>
        <input type="text" id="itemUrl" placeholder="PASTE LINK HERE...">
        <button onclick="runSearch()">Search Best Prices</button>
        <div id="status-msg" style="text-align:center; font-size:10px; margin-top:10px;"></div>
        <div id="results">
            <span class="label">Results (Tap Price to View):</span>
            <div id="list"></div>
        </div>
    </div>
</div>

<script>
    // --- APP STARTUP: ASKS FOR PERMISSIONS ---
    window.onload = function() {
        // Ask for Notifications
        if ("Notification" in window) {
            Notification.requestPermission();
        }
        // Ask for Location immediately
        navigator.geolocation.getCurrentPosition(() => {
            console.log("Location access granted.");
        }, () => {
            console.log("Location access denied.");
        });
    };

    function runSearch() {
        const input = document.getElementById('itemUrl').value;
        if (!input) return alert("ENTER A PRODUCT!");
        
        const status = document.getElementById('status-msg');
        status.innerText = "FINDING DEALS NEAR YOU...";

        setTimeout(() => {
            document.getElementById('results').style.display = 'block';
            status.innerText = "";

            const deals = [
                { name: "WALMART", dist: "Near Byesville", price: "$14.50", url: "https://www.walmart.com" },
                { name: "AMAZON", dist: "Prime Shipping", price: "$12.99", url: "https://www.amazon.com" },
                { name: "EBAY", dist: "Best Price Online", price: "$11.00", url: "https://www.ebay.com" }
            ];

            const list = document.getElementById('list');
            list.innerHTML = '';
            deals.forEach(deal => {
                list.innerHTML += `
                    <div class="result-item">
                        <div>
                            <div class="store-info">${deal.name}</div>
                            <span class="location-tag">${deal.dist}</span>
                        </div>
                        <a href="${deal.url}" target="_blank" style="text-decoration:none;">
                            <div class="price-box">${deal.price}</div>
                        </a>
                    </div>
                `;
            });
        }, 1500);
    }
</script>
</body>
</html>
